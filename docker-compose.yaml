version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: lab-mongo
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.adminCommand('ping').ok\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:7
    container_name: lab-mongo-init
    depends_on:
      mongo:
        condition: service_healthy
    restart: on-failure
    command:
      [
        "mongosh",
        "--host",
        "mongo:27017",
        "--quiet",
        "--eval",
        "try { rs.status() } catch(e) { rs.initiate({_id:'rs0', members:[{_id:0, host:'mongo:27017'}]}) }"
      ]

  redis:
    image: redis/redis-stack-server:latest
    container_name: lab-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    image: python:3.11-slim
    container_name: lab-app
    working_dir: /workspace
    volumes:
      - ./:/workspace
    command: ["bash", "-lc", "pip install -r requirements.txt && sleep infinity"]
    depends_on:
      mongo:
        condition: service_healthy
      mongo-init:
        condition: service_started
      redis:
        condition: service_healthy

volumes:
  mongo_data:
  redis_data:
